server.port=3000
spring.config.import=optional:file:.env[.properties]

# Performance Optimizations
spring.jpa.open-in-view=false
server.tomcat.max-threads=200
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:15}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}

# Database Config
spring.datasource.url=jdbc:postgresql://localhost:5432/${DATABASE_DB:database}
spring.datasource.username=${DATABASE_USER:user}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Swagger Config
springdoc.swagger-ui.path=/docs-ui
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.default-produces-media-type=application/json

# Cassandra Config
spring.cassandra.contact-points=${CASSANDRA_CONTACT_POINTS:127.0.0.1}
spring.cassandra.port=${CASSANDRA_PORT:9042}
spring.cassandra.keyspace-name=${CASSANDRA_KEYSPACE:keyspace}
spring.cassandra.local-datacenter=${CASSANDRA_LOCAL_DC:datacenter}
spring.cassandra.username=${CASSANDRA_USER:user}
spring.cassandra.password=${CASSANDRA_PASSWORD:password}
spring.cassandra.schema-action=create_if_not_exists
